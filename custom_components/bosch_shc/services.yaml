smokedetector_check:
  target:
    entity:
      integration: bosch_shc
      domain: binary_sensor

trigger_scenario:
  fields:
    title:
      example: "shc012345"
      required: false
      selector:
        text:
    name:
      example: "Scenario Name"
      required: true
      selector:
        text:

trigger_rawscan:
  fields:
