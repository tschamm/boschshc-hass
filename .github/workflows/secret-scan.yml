name: Secret scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # gitleaks posts inline comments on PRs
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so leaks in any past commit are caught
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_CONFIG → built-in default ruleset. Free for public repos.
