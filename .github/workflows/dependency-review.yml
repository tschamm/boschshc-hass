name: Dependency review

on:
  pull_request:
    paths:
      - "requirements*.txt"
      - "custom_components/bosch_shc/manifest.json"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
