name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: pytest (unit) / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/bosch_shc/manifest.json

      # Retry on PyPI edge-lag: a just-released pinned boschshcpy may not have
      # propagated to this runner's PyPI edge yet. Retry with backoff so the
      # suite self-heals instead of failing on transient unavailability.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install -r requirements_test.txt; then
              echo "Dependencies installed on attempt $attempt."
              exit 0
            fi
            echo "::warning::pip install failed (attempt $attempt) — likely a PyPI edge-lag on a just-released pin; retrying in $((attempt * 30))s."
            sleep $((attempt * 30))
          done
          echo "::error::pip install still failing after 5 attempts."
          exit 1

      # Mirrors scripts/local-ci.sh (hass leg): the pure-unit suite runs with
      # the pytest-homeassistant autoload DISABLED. test_config_flow.py and
      # test_device_trigger.py (+ tests/harness) need the full HA harness
      # (tests.common.MockConfigEntry) and are still WIP — excluded here.
      - name: Run unit tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          # Repo root on the path so `import custom_components.bosch_shc` resolves.
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/bosch_shc -q -o addopts=""
          --ignore=tests/bosch_shc/test_config_flow.py
          --ignore=tests/bosch_shc/test_device_trigger.py

      - name: Syntax check HA-harness test files (excluded from run)
        run: python3 -m py_compile tests/bosch_shc/test_config_flow.py tests/bosch_shc/test_device_trigger.py
