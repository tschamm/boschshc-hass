name: Quality

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: ruff · codespell · pip-audit · pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/bosch_shc/manifest.json

      - name: Install tooling
        run: pip install ruff codespell pip-audit pylint -r requirements_test.txt

      - name: ruff check (lint)
        run: ruff check custom_components

      - name: ruff format (format check)
        run: ruff format --check custom_components

      - name: codespell
        # Skip translations/ (legit foreign-language strings flagged as typos);
        # "hass" is the HA idiom, "unparseable" a valid variant.
        run: >-
          codespell custom_components
          --skip="*/translations/*"
          --ignore-words-list=hass,nd,childs,unparseable

      - name: pip-audit (our manifest deps)
        run: |
          python3 -c "import json;print(chr(10).join(json.load(open('custom_components/bosch_shc/manifest.json'))['requirements']))" > /tmp/our_reqs.txt
          # Retry: just after a same-session boschshcpy release the pinned
          # version can be missing from the GitHub-runner PyPI edge for a few
          # minutes ("No matching distribution"), even though it resolves on
          # other edges. Retry with backoff so the audit self-heals instead of
          # going red on transient mirror lag (mirrors tests.yml/release.yml).
          for i in 1 2 3 4 5; do
            pip-audit -r /tmp/our_reqs.txt && exit 0
            echo "pip-audit attempt $i failed; retrying in $((i*20))s (PyPI edge lag?)"
            sleep $((i*20))
          done
          echo "pip-audit still failing after retries" >&2
          exit 1

      - name: pylint
        run: pylint --rcfile=pyproject.toml custom_components/bosch_shc

      - name: quality scale gate (gold)
        run: python3 scripts/check-quality-scale.py --tier gold

      - name: quality scale platinum (informational — see inject-websession + strict-typing)
        run: python3 scripts/check-quality-scale.py --tier platinum || true

      - name: translation completeness
        # Checks: (1) every translation/*.json has the same options.features keys
        # as strings.json; (2) en.json entity section stays in sync with strings.json.
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          base = "custom_components/bosch_shc"
          errors = []

          # 1. options.features keys: must be identical across all translation files
          with open(f"{base}/strings.json") as f:
              strings_data = json.load(f)
          ref = set(strings_data["options"]["step"]["init"]["sections"]["features"]["data"].keys())
          json_files = [f for f in sorted(os.listdir(f"{base}/translations")) if f.endswith(".json")]
          for fname in json_files:
              with open(f"{base}/translations/{fname}") as f:
                  d = json.load(f)
              keys = set(d["options"]["step"]["init"]["sections"]["features"]["data"].keys())
              missing = ref - keys
              extra = keys - ref
              if missing:
                  errors.append(f"  {fname}: missing options.features keys {sorted(missing)}")
              if extra:
                  errors.append(f"  {fname}: extra options.features keys {sorted(extra)}")

          # 2. entity keys: en.json must stay in sync with strings.json
          def _flat(d, pfx=""):
              keys = set()
              if isinstance(d, dict):
                  for k, v in d.items():
                      p = f"{pfx}.{k}" if pfx else k
                      keys.update(_flat(v, p) if isinstance(v, dict) else {p})
              return keys

          strings_ent = _flat(strings_data.get("entity", {}))
          with open(f"{base}/translations/en.json") as f:
              en_ent = _flat(json.load(f).get("entity", {}))
          only_in_strings = strings_ent - en_ent
          only_in_en = en_ent - strings_ent
          if only_in_strings:
              errors.append(f"  en.json: entity keys in strings.json but missing: {sorted(only_in_strings)}")
          if only_in_en:
              errors.append(f"  en.json: extra entity keys not in strings.json: {sorted(only_in_en)}")

          if errors:
              print("Translation issues found:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f"All {len(json_files)} translation files match strings.json; en.json entity keys in sync")
          PYEOF
