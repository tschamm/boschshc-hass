name: Quality

on:
  workflow_call:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: ruff · codespell · pip-audit · pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/bosch_shc/manifest.json

      - name: Install tooling
        # Retry: just-released boschshcpy pin may not have propagated to the
        # GitHub-runner PyPI edge yet — mirrors the same retry in release.yml.
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install ruff codespell pip-audit pylint -r requirements_test.txt; then
              echo "Installed on attempt $attempt."
              exit 0
            fi
            echo "::warning::pip install failed (attempt $attempt) — PyPI edge lag?; retrying in $((attempt * 30))s."
            sleep $((attempt * 30))
          done
          echo "::error::pip install still failing after 5 attempts."
          exit 1

      - name: ruff check (lint)
        run: ruff check custom_components

      - name: ruff format (format check)
        run: ruff format --check custom_components

      - name: codespell
        # Skip translations/ (legit foreign-language strings flagged as typos);
        # "hass" is the HA idiom, "unparseable" a valid variant.
        run: >-
          codespell custom_components
          --skip="*/translations/*"
          --ignore-words-list=hass,nd,childs,unparseable

      - name: pip-audit (our manifest deps)
        run: |
          python3 -c "import json;print(chr(10).join(json.load(open('custom_components/bosch_shc/manifest.json'))['requirements']))" > /tmp/our_reqs.txt
          # Retry: just after a same-session boschshcpy release the pinned
          # version can be missing from the GitHub-runner PyPI edge for a few
          # minutes ("No matching distribution"), even though it resolves on
          # other edges. Retry with backoff so the audit self-heals instead of
          # going red on transient mirror lag (mirrors tests.yml/release.yml).
          for i in 1 2 3 4 5; do
            pip-audit -r /tmp/our_reqs.txt && exit 0
            echo "pip-audit attempt $i failed; retrying in $((i*20))s (PyPI edge lag?)"
            sleep $((i*20))
          done
          echo "pip-audit still failing after retries" >&2
          exit 1

      - name: pylint
        run: pylint --rcfile=pyproject.toml custom_components/bosch_shc

      - name: Type check
        run: mypy custom_components/bosch_shc/

      - name: quality scale gate (platinum)
        run: python3 scripts/check-quality-scale.py --tier platinum

      - name: translation completeness
        # Full-parity gate: every translations/<lang>.json must have the exact
        # same recursive key set as en.json (no untranslated fall-throughs, no
        # stale keys), and en.json entity section stays in sync with strings.json.
        run: python3 scripts/check-translations.py
