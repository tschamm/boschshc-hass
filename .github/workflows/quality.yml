name: Quality

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: ruff · codespell · pip-audit · pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install tooling
        run: pip install ruff codespell pip-audit pylint -r requirements_test.txt

      - name: ruff check (lint)
        run: ruff check custom_components

      - name: ruff format (format check)
        run: ruff format --check custom_components

      - name: codespell
        # Skip translations/ (legit foreign-language strings flagged as typos);
        # "hass" is the HA idiom, "unparseable" a valid variant.
        run: >-
          codespell custom_components
          --skip="*/translations/*"
          --ignore-words-list=hass,nd,childs,unparseable

      - name: pip-audit (our manifest deps)
        run: |
          python3 -c "import json;print(chr(10).join(json.load(open('custom_components/bosch_shc/manifest.json'))['requirements']))" > /tmp/our_reqs.txt
          # Retry: just after a same-session boschshcpy release the pinned
          # version can be missing from the GitHub-runner PyPI edge for a few
          # minutes ("No matching distribution"), even though it resolves on
          # other edges. Retry with backoff so the audit self-heals instead of
          # going red on transient mirror lag (mirrors tests.yml/release.yml).
          for i in 1 2 3 4 5; do
            pip-audit -r /tmp/our_reqs.txt && exit 0
            echo "pip-audit attempt $i failed; retrying in $((i*20))s (PyPI edge lag?)"
            sleep $((i*20))
          done
          echo "pip-audit still failing after retries" >&2
          exit 1

      - name: pylint
        run: pylint --rcfile=pyproject.toml custom_components/bosch_shc

      - name: quality scale gate (gold)
        run: python3 scripts/check-quality-scale.py --tier gold

      - name: quality scale platinum (informational — see inject-websession + strict-typing)
        run: python3 scripts/check-quality-scale.py --tier platinum || true

      - name: translation completeness
        # Every translation/*.json must have exactly the same data keys in
        # options.step.init.sections.features as strings.json.
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          base = "custom_components/bosch_shc"
          with open(f"{base}/strings.json") as f:
              ref = set(json.load(f)["options"]["step"]["init"]["sections"]["features"]["data"].keys())
          errors = []
          for fname in sorted(os.listdir(f"{base}/translations")):
              if not fname.endswith(".json"):
                  continue
              with open(f"{base}/translations/{fname}") as f:
                  d = json.load(f)
              keys = set(d["options"]["step"]["init"]["sections"]["features"]["data"].keys())
              missing = ref - keys
              extra = keys - ref
              if missing:
                  errors.append(f"  {fname}: missing keys {sorted(missing)}")
              if extra:
                  errors.append(f"  {fname}: extra keys {sorted(extra)}")
          if errors:
              print("Translation key mismatches found:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f"All {len(os.listdir(f'{base}/translations'))} translation files match strings.json")
          PYEOF
