name: Release

# Automated GitHub release on a version tag. Push an annotated tag `vX.Y.Z`
# (the maintainer's "ready" signal) and CI runs the unit suite first; only if
# it passes does it publish the GitHub release with auto-generated notes.
# HACS installs from these releases, so this is the full HA release step —
# no PyPI/token involved (the integration's lib dependency is on PyPI separately).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.6.1 or v0.6.1-beta.1)"
        required: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/quality.yml

  test:
    name: pytest (unit) gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/bosch_shc/manifest.json

      # Retry the install: when this release follows a same-session boschshcpy
      # release, the GitHub runner's PyPI edge may not have mirrored the new
      # pinned version yet (propagation lags unevenly across CDN edges). Retry
      # with backoff so the gate self-heals instead of needing a manual
      # `gh run rerun --failed` once the edge catches up.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install -r requirements_test.txt; then
              echo "Dependencies installed on attempt $attempt."
              exit 0
            fi
            echo "::warning::pip install failed (attempt $attempt) — likely a PyPI edge-lag on a just-released pin; retrying in $((attempt * 30))s."
            sleep $((attempt * 30))
          done
          echo "::error::pip install still failing after 5 attempts."
          exit 1

      # Same pure-unit suite as tests.yml (HA-harness tests excluded).
      - name: Run unit tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/bosch_shc -q -o addopts=""
          --ignore=tests/bosch_shc/test_config_flow.py
          --ignore=tests/bosch_shc/test_device_trigger.py

  release:
    name: Publish GitHub release
    needs: [quality, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        id: format
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]] || {
            echo "::error::TAG='$TAG' is not a semver tag (must match vX.Y.Z or vX.Y.Z-beta.N)"
            exit 1
          }
          if [[ "$TAG" =~ -beta\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # A beta tag (vX.Y.Z-beta.N) tests the CHANGELOG entry already
          # written for the eventual stable vX.Y.Z — strip the suffix to
          # find it.
          VERSION="${TAG#v}"
          VERSION="${VERSION%-beta.*}"
          # Release title = the full CHANGELOG heading ("X.Y.Z — summary"), so the
          # GitHub release matches the house style without manual polishing. Falls
          # back to the bare version if the heading has no "— summary" part.
          HEADING=$(grep -m1 "^## ${VERSION}\( \|$\)" CHANGELOG.md | sed 's/^## //')
          [ -z "$HEADING" ] && HEADING="$VERSION"
          echo "title=$HEADING" >> "$GITHUB_OUTPUT"
          awk "/^## $VERSION( |$)/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md \
            > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION — falling back to auto-notes."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          FALLBACK: ${{ steps.notes.outputs.fallback }}
          TITLE: ${{ steps.notes.outputs.title }}
          PRERELEASE: ${{ steps.format.outputs.prerelease }}
        run: |
          NOTES_FLAG="--notes-file /tmp/release-notes.md"
          [ "$FALLBACK" = "true" ] && NOTES_FLAG="--generate-notes"
          # Betas are marked --prerelease (HACS's "Show beta versions" toggle +
          # AwesomeVersion comparator already handle vX.Y.Z-beta.N sorting
          # correctly) so they never become the repo's "Latest release" —
          # that only happens for a plain vX.Y.Z tag.
          PRERELEASE_FLAG=""
          [ "$PRERELEASE" = "true" ] && PRERELEASE_FLAG="--prerelease"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              $NOTES_FLAG \
              $PRERELEASE_FLAG
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --verify-tag \
              $NOTES_FLAG \
              $PRERELEASE_FLAG
          fi
