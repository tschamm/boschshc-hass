name: Release

# Automated GitHub release on a version tag. Push an annotated tag `vX.Y.Z`
# (the maintainer's "ready" signal) and CI runs the unit suite first; only if
# it passes does it publish the GitHub release with auto-generated notes.
# HACS installs from these releases, so this is the full HA release step —
# no PyPI/token involved (the integration's lib dependency is on PyPI separately).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.6.1)"
        required: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/quality.yml

  test:
    name: pytest (unit) gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/bosch_shc/manifest.json

      # Retry the install: when this release follows a same-session boschshcpy
      # release, the GitHub runner's PyPI edge may not have mirrored the new
      # pinned version yet (propagation lags unevenly across CDN edges). Retry
      # with backoff so the gate self-heals instead of needing a manual
      # `gh run rerun --failed` once the edge catches up.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install -r requirements_test.txt; then
              echo "Dependencies installed on attempt $attempt."
              exit 0
            fi
            echo "::warning::pip install failed (attempt $attempt) — likely a PyPI edge-lag on a just-released pin; retrying in $((attempt * 30))s."
            sleep $((attempt * 30))
          done
          echo "::error::pip install still failing after 5 attempts."
          exit 1

      # Same pure-unit suite as tests.yml (HA-harness tests excluded).
      - name: Run unit tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/bosch_shc -q -o addopts=""
          --ignore=tests/bosch_shc/test_config_flow.py
          --ignore=tests/bosch_shc/test_device_trigger.py

  release:
    name: Publish GitHub release
    needs: [quality, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::TAG='$TAG' is not a semver tag (must match vX.Y.Z)"
            exit 1
          }

      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it untouched."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${TAG#v}" \
              --verify-tag \
              --generate-notes
          fi
